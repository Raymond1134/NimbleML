# Toy GPT training config — paths are relative to the toyGPT/ folder unless absolute.

[model]
# BPE vocabulary size (byte-level BPE: 256 base tokens + merges)
vocab_size = 16384
d_model = 512
n_layer = 18
n_head = 8
seq_len = 256
ff_mult = 4

[train]
# micro batch 8 fits 8 GB VRAM; grad_accum 8 -> effective batch 64 (matches Modal).
# Use 32 for effective 256 (~60 s/step, looks stuck); 8 gives ~12-15 s/step and ~1300 tok/s.
batch_size = 8
grad_accum_steps = 128
# Modal used 6e-4 @ batch 64; effective 256 wants ~1.2e-3 (sqrt rule) but 6e-4 is
# safer when resuming mid-cosine from a smaller micro-batch run.
lr = 2.5e-4
weight_decay = 0.1
warmup_steps = 63
# Plan A: 65M params overtrained ~2x past Chinchilla (40 tok/param) for a stronger
# small model. With grad_accum, each optimizer step sees 65536 tokens (256 x 256).
max_steps = 10000
grad_clip = 1.0
dtype = "float32"
device = "gpu"
# ~30 min at ~1.3 s/step; saves step_N + copies latest
checkpoint_every = 10
checkpoint_dir = "checkpoints"

# 0 = disabled; stop after N evals with no val_loss improvement
early_stop_patience = 0

[data]
# FineWeb-Edu streamed from HuggingFace; tokens cached as a uint16 .bin so
# re-runs and resumes skip download + re-encoding. NOTE: no '_' digit
# separators here (the 3.9 fallback TOML parser does not support them).
dataset = "fineweb-edu"
hf_repo = "HuggingFaceFW/fineweb-edu"
hf_subset = "sample-10BT"
# 2.6B tokens (~2x Chinchilla for a 65M model). sample-10BT (~10B tokens) is
# large enough to supply this without repeats.
train_tokens = 2600000000
val_tokens = 1000000
# MB of streamed text used to train the BPE vocab (one-time).
tokenizer_sample_mb = 400
data_dir = "data"
cache_dir = "data/cache"
tokenizer_path = "data/tokenizer.json"  

[eval]
# val_loss + best ckpt ~every 45 min at ~1.3 s/step (staggered from checkpoint_every)
eval_every = 10
eval_batches = 4096
sample_chars = 200
temperature = 0.8
# 1.0 = off; 1.1–1.3 typical for less repetitive generation (GPT-2 / HF style)
repetition_penalty = 1.2

[log]
verbose = 0
# log_every only affects print cadence; step timing still syncs every step
log_every = 1
log_grad_norm = 1
bpe_log_every = 5
rolling_avg = 50
# reclaim autograd closure cycles + CuPy pool blocks every N optimizer steps
gc_every = 1

[seed]
seed = 42
